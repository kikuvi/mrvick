services:

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
      MSSQL_PID: "Express"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' -C -b -o /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    image: ghcr.io/kikuvi/mrvick-api:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=db;Database=ShopfrontDb;User Id=sa;Password=${DB_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "mrvick.co.ke"
      Jwt__Audience: "mrvick.co.ke"
      SendGrid__ApiKey: "${SENDGRID_API_KEY}"
      SendGrid__FromEmail: "${SENDGRID_FROM_EMAIL}"
      SendGrid__FromName: "MrVick"
      AfricasTalking__Username: "${AT_USERNAME}"
      AfricasTalking__ApiKey: "${AT_API_KEY}"
      App__BaseUrl: "${APP_BASE_URL}"
      App__AdminPhone: "${ADMIN_PHONE}"
      Facebook__PixelId: "${FACEBOOK_PIXEL_ID}"
      Facebook__AccessToken: "${FACEBOOK_ACCESS_TOKEN}"
    volumes:
      - uploads:/app/wwwroot/uploads
    restart: unless-stopped

  frontend:
    image: ghcr.io/kikuvi/mrvick-frontend:latest
    depends_on:
      - api
    restart: unless-stopped
    # No ports exposed — traffic comes in via nginx-proxy only

  nginx-proxy:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
    restart: unless-stopped


volumes:
  sqldata:
  uploads:
  letsencrypt:
