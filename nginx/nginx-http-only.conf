# Temporary HTTP-only config used during initial certificate bootstrap.
# Replaced by nginx.conf once the certificate is obtained.
server {
    listen 80;
    server_name shopfront.co.ke www.shopfront.co.ke;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
