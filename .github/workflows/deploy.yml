name: Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/kikuvi/shop-api
  FRONTEND_IMAGE: ghcr.io/kikuvi/shop-frontend

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: ./Shopfront.API
          push: true
          tags: ${{ env.API_IMAGE }}:latest,${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./shopfront-client
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}
          ssh-passphrase: ${{ secrets.SSH_PASSPHRASE }}

      - name: Add server to known hosts
        run: ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Install Docker if not present
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "command -v docker > /dev/null 2>&1 \
             || (curl -fsSL https://get.docker.com | sh \
             && sudo usermod -aG docker \$USER \
             && sudo systemctl enable --now docker)"

      - name: Write .env and copy files to server
        run: |
          cat > .env <<ENVEOF
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          JWT_KEY=${{ secrets.JWT_KEY }}
          SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL=${{ secrets.SENDGRID_FROM_EMAIL }}
          AT_USERNAME=${{ secrets.AT_USERNAME }}
          AT_API_KEY=${{ secrets.AT_API_KEY }}
          APP_BASE_URL=${{ secrets.APP_BASE_URL }}
          ADMIN_PHONE=${{ secrets.ADMIN_PHONE }}
          ENVEOF

          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "mkdir -p /opt/shopfront/nginx /opt/shopfront/scripts"
          scp docker-compose.yml .env \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/shopfront/
          scp nginx/nginx.conf nginx/nginx-http-only.conf \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/shopfront/nginx/
          scp scripts/setup-ssl.sh \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/shopfront/scripts/

      - name: Deploy
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd /opt/shopfront \
             && echo '${{ secrets.GITHUB_TOKEN }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin \
             && docker compose pull \
             && docker compose up -d --remove-orphans \
             && docker image prune -f"
